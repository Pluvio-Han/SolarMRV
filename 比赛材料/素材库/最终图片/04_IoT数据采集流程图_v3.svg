<line x1="640.0" y1="1163" x2="640.0" y2="1221" class="connector"/>
<rect x="180" y="1510" width="920" height="90" rx="16" ry="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.6"/>
<text x="640" y="1546" text-anchor="middle" style="font:700 14px PingFang SC,Microsoft YaHei,Noto Sans SC,sans-serif; fill:#1F2937;">流程图说明</text>
<text x="640" y="1576" text-anchor="middle" style="font:500 12px PingFang SC,Microsoft YaHei,Noto Sans SC,sans-serif; fill:#6B7280;">系统先完成设备接入与结构化采集，再进行可信封装与自动监测，最终进入联盟链存证与前端展示输出。</text>
