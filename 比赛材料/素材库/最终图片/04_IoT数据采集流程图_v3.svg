<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1700" viewBox="0 0 1280 1700">
<rect width="100%" height="100%" fill="#FFFFFF"/>
<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#6B7280" opacity="0.95"/>
  </marker>
  <style>
    .title { font: 700 24px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #1F2937; }
    .subtitle { font: 500 13px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #6B7280; }
    .panel { fill: #FAFBFA; stroke: #D1D5DB; stroke-width: 1.8; }
    .section-title { font: 700 17px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #1F2937; }
    .node-text { font: 600 13px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; text-anchor: middle; dominant-baseline: middle; }
    .connector { stroke: #6B7280; stroke-width: 2; fill: none; stroke-linecap: round; marker-end: url(#arrow); }
  </style>
</defs>
<text x="640.0" y="42" text-anchor="middle" class="title">IoT 数据采集与可信处理流程图</text>
<text x="640.0" y="70" text-anchor="middle" class="subtitle">从真实设备接入到链上存证与展示输出的关键流程</text>
<rect x="60" y="110" width="1160" height="470" rx="18" ry="18" class="panel"/>
<rect x="60" y="620" width="1160" height="360" rx="18" ry="18" class="panel"/>
<rect x="60" y="1020" width="1160" height="260" rx="18" ry="18" class="panel"/>
<text x="640.0" y="140" text-anchor="middle" class="section-title">设备接入与数据生成阶段</text>
<text x="640.0" y="650" text-anchor="middle" class="section-title">可信处理与自动监测阶段</text>
