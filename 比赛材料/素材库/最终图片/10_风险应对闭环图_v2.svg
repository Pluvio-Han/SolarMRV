<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1320" viewBox="0 0 1280 1320">
<rect width="100%" height="100%" fill="#FFFFFF"/>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280" opacity="0.95"/>
  </marker>
  <style>
    .title { font: 700 24px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #1F2937; }
    .subtitle { font: 500 13px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #6B7280; }
    .node-title { font: 700 15px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; text-anchor: middle; }
    .node-text { font: 500 12px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; text-anchor: middle; fill: #4B5563; }
    .connector { stroke: #6B7280; stroke-width: 2; fill: none; stroke-linecap: round; marker-end: url(#arrow); }
  </style>
</defs>
<text x="640.0" y="42" text-anchor="middle" class="title">风险应对闭环图</text>
<text x="640.0" y="70" text-anchor="middle" class="subtitle">SolarGuard 通过识别、控制、验证与修正形成稳健推进闭环</text>
<rect x="80" y="110" width="1120" height="1120" rx="18" ry="18" fill="#FAFBFA" stroke="#D1D5DB" stroke-width="1.8"/>
<circle cx="640" cy="530" r="250" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.4" stroke-dasharray="6 6"/>
<rect x="490.0" y="120.0" width="300" height="120" rx="18" ry="18" fill="#E8F3EC" stroke="#2E6B4F" stroke-width="2.2"/>
<text x="640" y="172" class="node-title" fill="#123524">风险识别</text>
<text x="640" y="204" class="node-text">识别技术、合规、市场与资源风险</text>
<rect x="780.0" y="300.0" width="300" height="120" rx="18" ry="18" fill="#EAF0F8" stroke="#355C8A" stroke-width="2.2"/>
<text x="930" y="352" class="node-title" fill="#17324D">分类研判</text>
<text x="930" y="384" class="node-text">区分轻重缓急与当前阶段影响</text>
<rect x="780.0" y="640.0" width="300" height="120" rx="18" ry="18" fill="#E8F3EC" stroke="#2E6B4F" stroke-width="2.2"/>
<text x="930" y="692" class="node-title" fill="#123524">控制措施</text>
<text x="930" y="724" class="node-text">形成分阶段、可执行的控制方案</text>
<rect x="490.0" y="830.0" width="300" height="120" rx="18" ry="18" fill="#F7F3EA" stroke="#A46A1F" stroke-width="2.2"/>
<text x="640" y="882" class="node-title" fill="#5C3A10">小场景验证</text>
<text x="640" y="914" class="node-text">以试点和材料验证真实有效性</text>
<rect x="200.0" y="640.0" width="300" height="120" rx="18" ry="18" fill="#EAF0F8" stroke="#355C8A" stroke-width="2.2"/>
<text x="350" y="692" class="node-title" fill="#17324D">持续修正</text>
<text x="350" y="724" class="node-text">根据政策与场景变化迭代调整</text>
<rect x="200.0" y="300.0" width="300" height="120" rx="18" ry="18" fill="#E8F3EC" stroke="#2E6B4F" stroke-width="2.2"/>
<text x="350" y="352" class="node-title" fill="#123524">材料更新</text>
<text x="350" y="384" class="node-text">同步更新 BP、图表与对外表达</text>
<line x1="640" y1="240" x2="930" y2="300" class="connector"/>
<line x1="930" y1="420" x2="930" y2="640" class="connector"/>
<line x1="930" y1="760" x2="640" y2="830" class="connector"/>
<line x1="640" y1="830" x2="350" y2="760" class="connector"/>
<line x1="350" y1="640" x2="350" y2="420" class="connector"/>
<line x1="350" y1="300" x2="640" y2="240" class="connector"/>
<text x="640" y="525" text-anchor="middle" style="font:700 20px PingFang SC,Microsoft YaHei,Noto Sans SC,sans-serif; fill:#1F2937;">风险控制闭环</text>
<text x="640" y="555" text-anchor="middle" style="font:500 13px PingFang SC,Microsoft YaHei,Noto Sans SC,sans-serif; fill:#6B7280;">围绕真实原型、合规边界与小场景验证持续推进</text>
</svg>