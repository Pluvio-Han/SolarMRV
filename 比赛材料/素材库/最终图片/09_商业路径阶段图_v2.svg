<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1320" viewBox="0 0 1280 1320">
<rect width="100%" height="100%" fill="#FFFFFF"/>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280" opacity="0.95"/>
  </marker>
  <style>
    .title { font: 700 24px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #1F2937; }
    .subtitle { font: 500 13px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #6B7280; }
    .stage-title { font: 700 15px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #123524; }
    .stage-sub { font: 600 13px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #1F2937; }
    .stage-desc { font: 500 12px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #4B5563; }
    .output-title { font: 700 14px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #5C3A10; }
    .output-text { font: 500 12px 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; fill: #5B4630; }
    .connector { stroke: #6B7280; stroke-width: 2; fill: none; stroke-linecap: round; marker-end: url(#arrow); }
  </style>
</defs>
<text x="640.0" y="42" text-anchor="middle" class="title">商业路径阶段图</text>
