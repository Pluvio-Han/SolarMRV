[pytest]
# SolarMRV 测试配置
# 运行：pytest -v
# 覆盖率：pytest --cov=. --cov-report=html

minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 排除归档与运维脚本目录
norecursedirs =
    tests/deprecated
    .git
    .venv
    __pycache__
    node_modules
    contracts
    data
    charts
    logs

# 标记定义
markers =
    unit: 单元测试（无外部依赖）
    integration: 集成测试（需链节点 / 串口）
    slow: 耗时较长的测试
    chain: 涉及联盟链交互
    hardware: 涉及真实硬件设备

# 输出
addopts =
    -ra
    --strict-markers
    --tb=short
